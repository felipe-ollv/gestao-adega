quarkus.application.name=adega-backend
quarkus.http.host=0.0.0.0
quarkus.http.port=8080
quarkus.http.cors=true
quarkus.http.cors.origins=${CORS_ORIGINS}
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=Authorization,Content-Type

adega.api.logging.enabled=${API_LOGGING_ENABLED}
adega.api.logging.max-body-length=${API_LOGGING_MAX_BODY_LENGTH}

quarkus.datasource.db-kind=mysql
quarkus.datasource.username=${MYSQL_USER}
quarkus.datasource.password=${MYSQL_PASSWORD}
quarkus.datasource.jdbc.url=jdbc:mysql://db:3306/${MYSQL_DATABASE}
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false

mp.jwt.verify.issuer=${JWT_ISSUER}
mp.jwt.verify.publickey.location=${JWT_PUBLIC_KEY_LOCATION}
smallrye.jwt.sign.key.location=${JWT_PRIVATE_KEY_LOCATION}
adega.jwt.duration.minutes=${JWT_DURATION_MINUTES}

resend.api.url=${RESEND_API_URL}
resend.api.key=${RESEND_API_KEY}
resend.from.email=${RESEND_FROM_EMAIL}
resend.reply-to.email=${RESEND_REPLY_TO_EMAIL}
adega.app.base-url=${APP_BASE_URL}
adega.payment.whatsapp-number=${VITE_PAYMENT_WHATSAPP_NUMBER}
adega.email.monthly-fee-display=${EMAIL_MONTHLY_FEE_DISPLAY}
adega.email.due-warning-days=${EMAIL_DUE_WARNING_DAYS}
adega.email.notifications.enabled=${EMAIL_SCHEDULER_ENABLED}
adega.email.notifications.poll.every=${EMAIL_NOTIFICATION_POLL_EVERY}
