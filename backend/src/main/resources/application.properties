quarkus.application.name=adega-backend
quarkus.http.host=0.0.0.0
quarkus.http.port=8080
quarkus.http.cors=true
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:5173,http://localhost}
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=Authorization,Content-Type

quarkus.datasource.db-kind=mysql
quarkus.datasource.username=${DB_USER:adega_user}
quarkus.datasource.password=${DB_PASSWORD:adega_password}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:mysql://localhost:3306/adega_management}
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false

mp.jwt.verify.issuer=${JWT_ISSUER:adega-api}
mp.jwt.verify.publickey.location=${JWT_PUBLIC_KEY_LOCATION:publicKey.pem}
smallrye.jwt.sign.key.location=${JWT_PRIVATE_KEY_LOCATION:privateKey.pem}
adega.jwt.duration.minutes=${JWT_DURATION_MINUTES:240}
